name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

      - name: Governance checks
        run: |
          go run ./tools/checklayout
          go run ./tools/checkdocs -foundational
          go run ./tools/checkartifacts
          go run ./tools/checkstubs
          go run ./tools/checkgov -current-wave
          go run ./tools/checkci
